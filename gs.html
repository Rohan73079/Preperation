    body {

    h1 {
      margin-bottom: 30px;
      color: #333;
    }

    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 25px;
      max-width: 1000px;
      margin: auto;
    }

    .subject-card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
      transition: 0.3s;
      cursor: pointer;
    }

    .subject-card:hover {
      transform: scale(1.05);
      box-shadow: 0px 6px 12px rgba(0,0,0,0.15);
    }

    .subject-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .subject-card p {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin: 0;
    }

    .back-btn {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #45a049;
    }
  </style>
</head>
