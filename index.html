<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Point</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(to right, #e3f2fd, #f9fbe7);
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      background: #4CAF50;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .navbar h2 {
      margin: 0;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }
    .navbar a:hover {
      text-decoration: underline;
    }

    /* Main */
    .welcome {
      text-align: center;
      padding: 50px 20px 20px 20px;
    }
    .welcome h1 {
      font-size: 40px;
      color: #333;
    }
    .welcome p {
      font-size: 18px;
      color: #555;
    }

    /* Buttons */
    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      max-width: 1000px;
      margin: auto;
      padding: 40px;
    }
    .batch-btn {
      padding: 30px 20px;
      border: none;
      border-radius: 16px;
      background: white;
      color: #333;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .batch-btn:hover {
      background: #4CAF50;
      color: white;
      transform: translateY(-5px);
    }

    /* Footer */
    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <h2>UPSI 2025</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="Portfolio/iindex.html">About</a>
      <a href="Portfolio/iindex.html#contact">Contact</a>
    </div>
  </div>

  <!-- Welcome Section -->
  <div class="welcome">
    <h1>Welcome to Study Portal 🚀</h1>
    <p>Choose your batch and start your learning journey with us.  
    We provide Police preparation, Placement training, and other competitive batches.</p>
  </div>

  <!-- Buttons -->
  <div class="button-container">
    <button class="batch-btn" onclick="location.href='Police batches.html'">🚔 Police Batches</button>
    <button class="batch-btn" onclick="location.href='Placementprep.html'">💼 Placement Preparation</button>
    <button class="batch-btn" onclick="location.href='otherbatch.html'">📚 Other Batches</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2025 UPSI Preparation | Designed by You</p>
  </div>
</body>
</html>
