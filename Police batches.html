<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPSI 2025 Batches</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f5f9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #333;
      margin-bottom: 40px;
    }
    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: auto;
    }
    .batch-btn {
      padding: 20px;
      border: none;
      border-radius: 12px;
      background: #4CAF50;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .batch-btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }
     /* Back Button */
     .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .back-button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <button class="back-button" onclick="location.href='index.html'">⬅ Back</button>

  <h1>UPSI 2025 Batches</h1>
  <h2>Select Your Batch</h2>

  <div class="button-container">
    <button class="batch-btn" onclick="location.href='Vinayak.html'">Vinayak Batch 2.0</button>
    <button class="batch-btn" onclick="location.href='otherbatch.html'">Other Batch</button>
  </div>
</body>
</html>
